# ══════════════════════════════════════════════════════════════
# Cambodia Rain 8888 Pro V3 — weather.yml
# GitHub Actions Workflow: Automated Weather Alert Bot
# MR TP AI Weather Intelligence Center
#
# This workflow runs telegram.py every 10 minutes automatically.
# Secrets are stored in GitHub Secrets — never hardcoded.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   TELEGRAM_BOT_TOKEN  — Bot token from @BotFather
#   TELEGRAM_CHAT_ID    — Target chat/channel ID
#
# Setup:
#   1. Go to your repo → Settings → Secrets → Actions
#   2. Add TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
#   3. Go to Actions tab → Enable Actions
#   4. This workflow runs automatically every 10 minutes
# ══════════════════════════════════════════════════════════════

name: Cambodia Rain 8888 Pro — Weather Alert Bot

on:
  # ── Scheduled: every 10 minutes ──────────────────────────
  schedule:
    - cron: "*/10 * * * *"

  # ── Manual trigger (for testing) ─────────────────────────
  workflow_dispatch:
    inputs:
      force_send:
        description: "Force send alert regardless of risk level"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      threshold:
        description: "Minimum confidence score to trigger alert (0-100)"
        required: false
        default: "40"
        type: string

  # ── Push trigger for CI testing ───────────────────────────
  push:
    branches:
      - main
    paths:
      - "telegram.py"
      - "weather.yml"

# Cancel any in-progress run if a newer one starts
concurrency:
  group: weather-alert
  cancel-in-progress: false

jobs:
  # ── JOB: SEND WEATHER ALERT ─────────────────────────────
  weather-alert:
    name: "🌦 Weather Alert — Phnom Penh"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── Step 1: Checkout code ────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Set up Python ────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
    

      # ── Step 3: Install dependencies (stdlib only) ───────
      # telegram.py uses only Python stdlib — no pip installs needed
      - name: ✅ Verify Python environment
        run: |
          python --version
          python -c "import json, urllib, logging; print('All stdlib modules OK')"

      # ── Step 4: Validate secrets ──────────────────────────
      - name: 🔑 Validate secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "❌ ERROR: TELEGRAM_BOT_TOKEN secret is not set!"
            echo "Go to: Settings → Secrets → Actions → New repository secret"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "❌ ERROR: TELEGRAM_CHAT_ID secret is not set!"
            exit 1
          fi
          echo "✅ Secrets validated"

      # ── Step 5: Run alert bot ─────────────────────────────
      - name: 🌧 Run Weather Alert Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Determine arguments
          FORCE_ARG=""
          THRESHOLD_ARG="--threshold 40"

          # Handle manual trigger inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force_send }}" = "true" ]; then
              FORCE_ARG="--force"
            fi
            if [ -n "${{ inputs.threshold }}" ]; then
              THRESHOLD_ARG="--threshold ${{ inputs.threshold }}"
            fi
          fi

          echo "Running: python telegram.py $FORCE_ARG $THRESHOLD_ARG"
          python telegram.py $FORCE_ARG $THRESHOLD_ARG

      # ── Step 6: Log run summary ───────────────────────────
      - name: 📊 Log run info
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "Run:       ${{ github.run_number }}"
          echo "Trigger:   ${{ github.event_name }}"
          echo "Time:      $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Status:    ${{ job.status }}"
          echo "════════════════════════════════════"

      # ── Step 7: Notify on failure ─────────────────────────
      - name: ⚠️ Alert on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Send error notification to Telegram
          ERROR_MSG="⚠️ Cambodia Rain 8888 Bot Error%0ARun #${{ github.run_number }} failed.%0ACheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${ERROR_MSG}" || true
